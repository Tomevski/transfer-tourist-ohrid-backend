# Render Blueprint for the backend: a free Dockerized web service + free Postgres.
# Render injects PORT (honoured via application.yml) and healthchecks the
# mail-independent /actuator/health endpoint. Secret values are marked
# `sync: false` so Render prompts for them at deploy time instead of storing
# them in this file; APP_JWT_SECRET is generated by Render automatically.
services:
  - type: web
    name: transfer-tourist-backend
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /actuator/health
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      # Database — wired from the managed Postgres below (host/port/name/user/password).
      - key: DB_HOST
        fromDatabase:
          name: transfer-tourist-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: transfer-tourist-db
          property: port
      - key: DB_NAME
        fromDatabase:
          name: transfer-tourist-db
          property: database
      - key: DB_USERNAME
        fromDatabase:
          name: transfer-tourist-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: transfer-tourist-db
          property: password
      # Email (Brevo) — filled in at deploy time.
      - key: MAIL_HOST
        value: smtp-relay.brevo.com
      - key: MAIL_PORT
        value: "587"
      - key: MAIL_USERNAME
        sync: false
      - key: MAIL_PASSWORD
        sync: false
      - key: APP_MAIL_FROM
        sync: false
      - key: APP_MAIL_OPERATOR
        value: htomevski0106@hotmail.com
      # Auth — JWT secret auto-generated by Render; admin login prompted at deploy.
      - key: APP_JWT_SECRET
        generateValue: true
      - key: APP_ADMIN_EMAIL
        sync: false
      - key: APP_ADMIN_PASSWORD
        sync: false
      - key: APP_ADMIN_NAME
        value: Ana (Admin)
      # Frontend origin for CORS — update once the SPA is deployed.
      - key: APP_CORS_ALLOWED_ORIGINS
        value: http://localhost:5173

databases:
  - name: transfer-tourist-db
    plan: free
    databaseName: transfer_tourist
    user: transfer
