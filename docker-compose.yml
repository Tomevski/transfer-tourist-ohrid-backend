# Local Postgres for development. Start with: docker compose up -d
# Matches the defaults in application-dev.yml.
services:
  db:
    image: postgres:16-alpine
    container_name: transfer-tourist-db
    environment:
      POSTGRES_DB: transfer_tourist
      POSTGRES_USER: transfer
      POSTGRES_PASSWORD: transfer
    ports:
      - "5432:5432"
    volumes:
      - transfer_tourist_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U transfer -d transfer_tourist"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Dev SMTP sink (Milestone 2.6). App sends to :1025; open the web UI at
  # http://localhost:8025 to view every rendered email. Delivers nowhere real.
  mailhog:
    image: mailhog/mailhog:latest
    container_name: transfer-tourist-mailhog
    ports:
      - "1025:1025"   # SMTP
      - "8025:8025"   # web UI
    restart: unless-stopped

volumes:
  transfer_tourist_pgdata:
