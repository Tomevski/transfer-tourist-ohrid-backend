# Test profile: in-memory H2 (PostgreSQL compatibility mode). Flyway is disabled
# — the Postgres-specific migrations run only against a real database — so
# Hibernate builds the schema from the JPA entities (create-drop). This also
# validates every entity/embeddable mapping on each context-load test.
spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    username: sa
    password: ""
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    database-platform: org.hibernate.dialect.H2Dialect
  flyway:
    enabled: false

app:
  cors:
    allowed-origins: http://localhost:5173
