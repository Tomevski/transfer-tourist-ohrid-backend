<!DOCTYPE html>
<!-- To the operator: every booking + customer detail. Reply-to = customer. -->
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{email/_layout :: page('New booking request', ~{::content})}">
<body>
<div th:fragment="content">

  <p style="margin:0 0 4px 0;">A new transfer request has just come in. Full details below.</p>

  <div th:replace="~{email/_layout :: refBadge(${booking.referenceCode})}">badge</div>

  <table th:replace="~{email/_layout :: legBlock('Outbound trip', ${booking.outbound})}">outbound</table>
  <table th:replace="${booking.returnLeg != null} ? ~{email/_layout :: legBlock('Return trip', ${booking.returnLeg})} : ~{}">return</table>

  <h3 style="margin:22px 0 4px 0;font-size:15px;color:#1f2d3d;">Booking summary</h3>
  <table th:replace="~{email/_layout :: tripSummary(${booking})}">summary</table>

  <p th:if="${!#strings.isEmpty(booking.comments)}" style="margin:12px 0 0 0;">
    <span style="color:#7a8aa0;">Comments:</span><br/>
    <span th:text="${booking.comments}">comments</span>
  </p>

  <h3 style="margin:22px 0 4px 0;font-size:15px;color:#1f2d3d;">Customer</h3>
  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="font-size:14px;">
    <tr>
      <td style="color:#7a8aa0;width:130px;padding:3px 0;">Name</td>
      <td th:text="${booking.customer.fullName}">Name</td>
    </tr>
    <tr>
      <td style="color:#7a8aa0;padding:3px 0;">Email</td>
      <td><a th:href="'mailto:' + ${booking.customer.email}" th:text="${booking.customer.email}"
             style="color:#2f80ed;text-decoration:none;">email</a></td>
    </tr>
    <tr>
      <td style="color:#7a8aa0;padding:3px 0;">Phone</td>
      <td><a th:href="'tel:' + ${booking.customer.phone}" th:text="${booking.customer.phone}"
             style="color:#2f80ed;text-decoration:none;">phone</a></td>
    </tr>
  </table>

  <p style="margin:22px 0 0 0;font-size:13px;color:#7a8aa0;">
    Reply directly to this email to reach the customer.
  </p>

</div>
</body>
</html>
