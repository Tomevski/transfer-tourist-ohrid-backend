spring:
  application:
    name: transfer-tourist
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate   # schema is owned by Flyway, never by Hibernate
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    baseline-on-migrate: true

server:
  port: ${SERVER_PORT:8080}

# API versioning: all endpoints live under /api/v1 (set on controllers).
springdoc:
  swagger-ui:
    path: /swagger-ui.html

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized

# Comma-separated list of SPA origins allowed by CORS (see CorsConfig).
app:
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173}
  # Transactional email (Milestone 2.6). SMTP transport itself is configured per
  # profile under spring.mail (dev = MailHog, prod = a real provider via env).
  mail:
    # Envelope From on every message.
    from: ${APP_MAIL_FROM:no-reply@transfertourist.com}
    # Operator/admin inbox that receives new-booking notifications and is the
    # reply-to on all customer emails. Override per environment via env var.
    operator: ${APP_MAIL_OPERATOR:htomevski0106@hotmail.com}
  # Stateless JWT auth (Milestone 2.4). The secret MUST be overridden in prod
  # (>= 32 bytes for HS256); the default below is for local dev only.
  jwt:
    secret: ${APP_JWT_SECRET:dev-only-insecure-secret-change-me-in-production-0123456789}
    expiration-ms: ${APP_JWT_EXPIRATION_MS:86400000} # 24h
  # Admin account seeded at startup if absent. Override the password in prod.
  admin:
    email: ${APP_ADMIN_EMAIL:admin@transfertourist.com}
    password: ${APP_ADMIN_PASSWORD:admin123}
    name: ${APP_ADMIN_NAME:Ana (Admin)}
